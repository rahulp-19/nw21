<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="SweetXXorn Entry - Premium and Luxury Cinematic Streaming Platform. Sign in or establish VIP identity.">
  <title>SweetXXorn | Entry & Verification</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling to center the card on the page */
    .login-page-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100vw;
      padding: 20px;
      position: relative;
      z-index: 10;
    }
    
    .login-brand-header {
      margin-bottom: 25px;
      text-align: center;
    }

    .login-brand-header a {
      font-family: var(--font-title);
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
    }

    .static-auth-container {
      position: relative !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      background: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      display: flex !important;
      align-items: center;
      justify-content: center;
      z-index: auto !important;
      width: 100%;
      max-width: 450px;
      height: auto !important;
    }
    
    .static-auth-container .modal-container {
      width: 100%;
      max-width: 450px;
      margin: 0;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(231, 193, 27, 0.2);
    }
  </style>
</head>

<body>
  <!-- Entire Website Dual GIF Background -->
  <div class="site-wide-gif-bg">
    <div class="site-wide-gif-left" style="background-image: url('redvid_io_porn_porn_porn_💖😵_💫💖.gif');"></div>
    <div class="site-wide-gif-right" style="background-image: url('redvid_io_porn_porn_porn_💖😵_💫💖 (1).gif');"></div>
  </div>

  <div class="login-page-container">
    <div class="login-brand-header">
      <a href="index.html">
        <i class="fa-solid fa-gem text-gold-gradient"></i>
        <span class="text-gold-gradient">SweetXXorn</span>
      </a>
    </div>

    <!-- Static Container mapped to ID so script.js hooks it up -->
    <div class="static-auth-container" id="auth-modal-overlay">
      <!-- Login Card -->
      <div class="modal-container" id="login-modal-container">
        <div class="modal-header">
          <h3 class="modal-title font-luxury">SweetXXorn Entry</h3>
          <a href="index.html" class="modal-close-btn">&times;</a>
        </div>
        <div class="modal-body">
          <div class="error-message" id="login-error-msg"></div>
          <div class="success-message" id="login-success-msg"></div>
          <form id="login-form">
            <div class="form-group">
              <label>Username or Email Address</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="text" id="login-email" placeholder="Enter your email address..." required>
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="login-password" placeholder="Enter account password..." required>
                <button type="button" class="password-toggle-btn"><i class="fa-solid fa-eye"></i></button>
              </div>
            </div>
            <div class="form-links">
              <a href="#" id="auth-forgot-trigger">Forgot Password?</a>
              <a href="#" id="auth-signup-trigger">Create Free Account</a>
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;">Sign In</button>
          </form>
        </div>
      </div>

      <!-- Registration Card -->
      <div class="modal-container" id="register-modal-container" style="display:none;">
        <div class="modal-header">
          <h3 class="modal-title font-luxury">Establish VIP Identity</h3>
          <a href="index.html" class="modal-close-btn">&times;</a>
        </div>
        <div class="modal-body">
          <div class="error-message" id="register-error-msg"></div>
          <form id="register-form">
            <div class="form-group">
              <label>Choose Display Name</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" id="register-name" placeholder="John Doe" required>
              </div>
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="register-email" placeholder="example@domain.com" required>
              </div>
            </div>
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="register-password" placeholder="At least 6 characters" required>
                <button type="button" class="password-toggle-btn"><i class="fa-solid fa-eye"></i></button>
              </div>
            </div>
            <div class="form-links">
              <a href="#" id="auth-login-trigger">Already registered? Sign In</a>
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;">Create Account</button>
          </form>
        </div>
      </div>

      <!-- Forgot Password Card -->
      <div class="modal-container" id="forgot-modal-container" style="display:none;">
        <div class="modal-header">
          <h3 class="modal-title font-luxury">Access Recovery</h3>
          <a href="index.html" class="modal-close-btn">&times;</a>
        </div>
        <div class="modal-body">
          <div class="error-message" id="forgot-error-msg"></div>
          <div class="success-message" id="forgot-success-msg"></div>
          <form id="forgot-form">
            <p class="text-secondary mb-3" style="font-size:0.85rem;">Specify your email address below. We'll send
              instructions to reset your password securely.</p>
            <div class="form-group">
              <label>Email Address</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="forgot-email" placeholder="example@domain.com" required>
              </div>
            </div>
            <div class="form-links">
              <a href="#" id="forgot-back-login-trigger">Back to Login</a>
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;">Send Verification Link</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
